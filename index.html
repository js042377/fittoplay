<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FTP">
<title>Fit to Play</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --tennis:#1D9E75;--tennis-l:#E1F5EE;--tennis-d:#0F6E56;
  --golf:#D85A30;--golf-l:#FAECE7;--golf-d:#712B13;
  --insole:#7F77DD;--insole-l:#EEEDFE;--insole-d:#534AB7;
  --bg:#F7F6F3;--surface:#FFFFFF;--border:#E6E4DE;
  --text:#1C1C1A;--muted:#8A8880;--faint:#C5C3BC;
  --danger:#E24B4A;--danger-bg:#FCEBEB;
  --warn:#EF9F27;--warn-bg:#FAEEDA;
  --success:#1D9E75;--success-bg:#E1F5EE;
  --r:10px;--rs:7px;
}
html,body{height:100%;background:var(--bg);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--text);font-size:14px;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--surface);position:relative}
.hdr{padding:12px 16px 8px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand{font-size:16px;font-weight:800;letter-spacing:-.5px}
.brand .t{color:var(--tennis)}.brand .g{color:var(--golf)}
.sync-btn{font-size:11px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit}
.sync-btn.going{color:var(--tennis);border-color:var(--tennis)}
.spin{display:inline-block}.going .spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.branch-row{display:flex;gap:6px}
.bpill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);font-family:inherit}
.bpill.bt{background:var(--tennis-l);color:var(--tennis-d);border-color:var(--tennis)}
.bpill.bg{background:var(--golf-l);color:var(--golf-d);border-color:var(--golf)}
.bpill.ba{background:var(--insole-l);color:var(--insole-d);border-color:var(--insole)}
.content{flex:1;overflow-y:auto;padding:14px 16px 80px;-webkit-overflow-scrolling:touch}
.tabbar{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 2px 5px;cursor:pointer;color:var(--faint);font-size:8px;gap:1px;border:none;background:none;font-family:inherit}
.ti-icon{font-size:17px;line-height:1}
.ti.at{color:var(--tennis)}.ti.ag{color:var(--golf)}.ti.ai{color:var(--insole)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.card.ct{border-left:3px solid var(--tennis)}
.card.cg{border-left:3px solid var(--golf)}
.card.ci{border-left:3px solid var(--insole)}
.ctit{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sbox{border-radius:var(--rs);padding:11px 12px}
.sbox.st{background:var(--tennis-l)}.sbox.sg{background:var(--golf-l)}.sbox.si{background:var(--insole-l)}.sbox.sn{background:var(--bg)}
.slbl{font-size:10px;font-weight:600;margin-bottom:4px}
.sbox.st .slbl{color:var(--tennis-d)}.sbox.sg .slbl{color:var(--golf-d)}.sbox.si .slbl{color:var(--insole-d)}.sbox.sn .slbl{color:var(--muted)}
.sval{font-size:21px;font-weight:700;line-height:1}
.sbox.st .sval{color:var(--tennis-d)}.sbox.sg .sval{color:var(--golf-d)}.sbox.si .sval{color:var(--insole-d)}
.ssub{font-size:10px;margin-top:2px;color:var(--muted)}
.bdg{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.b-act{background:var(--success-bg);color:var(--tennis-d)}
.b-pse{background:var(--warn-bg);color:#633806}
.b-end{background:var(--bg);color:var(--muted)}
.b-접수{background:#E6F1FB;color:#0C447C}
.b-측정{background:var(--warn-bg);color:#633806}
.b-제작중{background:var(--insole-l);color:var(--insole-d)}
.b-전달완료{background:var(--success-bg);color:var(--tennis-d)}

.b-수정임박{background:#FAEEDA;color:#633806}
.b-수정예약{background:#EEEDFE;color:#534AB7}
.revcard{background:var(--surface);border:1.5px solid var(--warn);border-radius:var(--r);padding:11px;margin-bottom:8px}

.b-트레이닝{background:var(--tennis-l);color:var(--tennis-d)}
.b-인솔{background:var(--insole-l);color:var(--insole-d)}
.b-지출{background:var(--warn-bg);color:#633806}
.b-카드{background:#E6F1FB;color:#0C447C}
.b-현금{background:var(--tennis-l);color:var(--tennis-d)}
.b-계좌이체{background:var(--insole-l);color:var(--insole-d)}
.btn{padding:7px 14px;border-radius:var(--rs);border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--surface);color:var(--text);font-weight:500;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-t{background:var(--tennis);color:#fff;border-color:var(--tennis)}
.btn-g{background:var(--golf);color:#fff;border-color:var(--golf)}
.btn-i{background:var(--insole);color:#fff;border-color:var(--insole)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px}
.li{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.li:last-child{border-bottom:none}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.av-t{background:var(--tennis-l);color:var(--tennis-d)}
.av-i{background:var(--insole-l);color:var(--insole-d)}
.av-g{background:var(--golf-l);color:var(--golf-d)}
.im{flex:1;min-width:0}
.in{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.is{font-size:11px;color:var(--muted)}
.ir{text-align:right;flex-shrink:0}
.prog{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-top:4px}
.prog-f{height:100%;border-radius:2px;background:var(--tennis)}
.prog-f.low{background:var(--danger)}.prog-f.mid{background:var(--warn)}
.lcard{background:var(--surface);border:1.5px solid var(--tennis);border-radius:var(--r);padding:12px;margin-bottom:8px}
.lcard.golf{border-color:var(--golf)}
.att-row{display:flex;gap:6px;margin:8px 0}
.att-btn{flex:1;padding:7px 4px;border-radius:var(--rs);border:1.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--muted);font-family:inherit;text-align:center}
.att-btn.s-출석{background:var(--tennis-l);color:var(--tennis-d);border-color:var(--tennis)}
.att-btn.s-결석{background:var(--danger-bg);color:#A32D2D;border-color:var(--danger)}
.att-btn.s-보강{background:var(--warn-bg);color:#633806;border-color:var(--warn)}
.done-btn{width:100%;padding:10px;border-radius:var(--rs);border:none;background:var(--tennis);color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit}
.done-btn.golf{background:var(--golf)}
.done-btn:disabled{background:var(--faint);cursor:default}
.pm-row{display:flex;gap:6px;margin-top:6px}
.pm-btn{flex:1;padding:7px 4px;border-radius:var(--rs);border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--muted);font-family:inherit;text-align:center}
.pm-btn.s-카드{background:#E6F1FB;color:#0C447C;border-color:#378ADD}
.pm-btn.s-현금{background:var(--tennis-l);color:var(--tennis-d);border-color:var(--tennis)}
.pm-btn.s-계좌이체{background:var(--insole-l);color:var(--insole-d);border-color:var(--insole)}
.icard{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--insole);border-radius:var(--r);padding:12px;margin-bottom:8px}
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:8px 0}
.ibox{background:var(--insole-l);border-radius:var(--rs);padding:5px 8px}
.ibox.wide{grid-column:span 3;background:var(--bg)}
.ilbl{font-size:9px;font-weight:600;color:var(--insole-d);margin-bottom:2px}
.ival{font-size:11px;font-weight:600;color:var(--insole-d)}
.ibox.wide .ilbl{color:var(--muted)}.ibox.wide .ival{color:var(--text);font-weight:400;white-space:normal}
.pipe{display:flex;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:12px}
.pb{flex:1;text-align:center;padding:8px 2px;font-size:10px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--muted);border:none;border-right:1px solid var(--border);font-family:inherit}
.pb:last-child{border-right:none}
.pb.act{background:var(--insole-l);color:var(--insole-d)}
.pn{font-size:16px;font-weight:700;display:block;color:inherit}
.steps{display:flex;align-items:center;gap:3px}
.sd{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;border:1.5px solid var(--border);background:var(--bg);color:var(--muted)}
.sd.done{background:var(--insole);color:#fff;border-color:var(--insole)}
.sd.cur{background:var(--warn);color:#fff;border-color:var(--warn)}
.sl{flex:1;height:1.5px;background:var(--border)}.sl.done{background:var(--insole)}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.cal-dlbl{text-align:center;font-size:10px;font-weight:600;color:var(--muted);padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{border:1px solid var(--border);border-radius:6px;padding:4px;min-height:62px;cursor:pointer}
.cal-cell:active{background:var(--bg)}
.cal-num{font-size:11px;font-weight:600;margin-bottom:2px}
.cal-num.td{background:var(--tennis);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.cal-dot{font-size:9px;line-height:1.6;overflow:hidden}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.blbl{font-size:11px;width:24px;color:var(--muted);text-align:right}
.btrack{flex:1;height:16px;background:var(--bg);border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:9px;font-weight:700;color:#fff}
.bnum{font-size:11px;width:44px;text-align:right;color:var(--muted)}
.sbar{display:flex;gap:8px;margin-bottom:12px}
.sinp{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.sinp:focus{outline:none;border-color:var(--tennis)}
.ssel{padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:12px;background:var(--bg);color:var(--text);font-family:inherit}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;flex-direction:column;justify-content:flex-end}
.mbg.open{display:flex}
.msheet{background:var(--surface);border-radius:20px 20px 0 0;padding:18px 16px;max-height:92vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.mtit{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.mdot{width:8px;height:8px;border-radius:50%}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fg{margin-bottom:10px}
.flbl{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;letter-spacing:.2px}
.finp{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.finp:focus{outline:none;border-color:var(--tennis)}
textarea.finp{resize:vertical;min-height:56px}
.mact{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.mact .btn{flex:1;padding:11px}
.acw{position:relative}
.acl{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);z-index:300;max-height:150px;overflow-y:auto;display:none;box-shadow:0 8px 20px rgba(0,0,0,.12)}
.acl.open{display:block}
.aci{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border)}
.aci:last-child{border-bottom:none}
.aci:active{background:var(--insole-l)}
.acn{font-size:13px;font-weight:600}
.acs{font-size:10px;color:var(--muted);margin-top:1px}
.perf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.perf-bar-wrap{display:flex;gap:4px;align-items:flex-end;height:48px;margin-top:8px}
.perf-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.perf-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px}
.perf-lbl{font-size:8px;color:var(--muted);text-align:center}
.alert-banner{background:var(--danger);color:#fff;padding:8px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(10px);background:#1C1C1A;color:#fff;padding:9px 16px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:all .22s;z-index:500;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:13px}
.alrow{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--warn-bg);border-radius:var(--rs);margin-bottom:6px;font-size:12px;color:#633806}
@media(max-width:360px){.sgrid{grid-template-columns:1fr 1fr}.frow{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="brand"><span class="t">Tennis</span><span style="color:var(--faint)"> · </span><span class="g">Golf</span></div>
      <div style="display:flex;gap:6px;align-items:center">
        <div id="hdr-btns"></div>
        <button class="sync-btn" id="sync-btn" onclick="syncAll()"><span class="spin">↻</span><span id="sync-lbl">동기화</span></button>
      </div>
    </div>
    <div class="branch-row">
      <button class="bpill bt" onclick="setBranch('tennis',this)">테니스(목동)</button>
      <button class="bpill" onclick="setBranch('golf',this)">골프(용인)</button>
      <button class="bpill" onclick="setBranch('all',this)" style="margin-left:auto">전체</button>
    </div>
  </div>
  <div id="due-banner" style="display:none" class="alert-banner">
    <span id="due-banner-text"></span>
    <button onclick="document.getElementById('due-banner').style.display='none'" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer">×</button>
  </div>
  <div class="content" id="content"></div>
  <div class="tabbar">
    <button class="ti at" onclick="gotoTab('dash',this,'t')"><span class="ti-icon">◈</span><span>홈</span></button>
    <button class="ti" onclick="gotoTab('members',this,'t')"><span class="ti-icon">◉</span><span>회원</span></button>
    <button class="ti" onclick="gotoTab('schedule',this,'t')"><span class="ti-icon">▦</span><span>스케줄</span></button>
    <button class="ti" onclick="gotoTab('revenue',this,'t')"><span class="ti-icon">◐</span><span>매출</span></button>
    <button class="ti" onclick="gotoTab('insole',this,'i')"><span class="ti-icon">◆</span><span>인솔</span></button>
    <button class="ti" onclick="gotoTab('perf',this,'t')"><span class="ti-icon">★</span><span>평가</span></button>
    <button class="ti" onclick="openKakao()"><span class="ti-icon">✉</span><span>알림톡</span></button>
    <button class="ti" onclick="openReport()"><span class="ti-icon">◑</span><span>리포트</span></button>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- 회원 모달 -->
<div class="mbg" id="m-member">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtit"><span class="mdot" style="background:var(--tennis)"></span><span id="m-member-tit">회원 추가</span></div>
    <div class="frow">
      <div class="fg"><label class="flbl">이름</label><input class="finp" id="f-name" placeholder="홍길동"></div>
      <div class="fg"><label class="flbl">연락처</label><input class="finp" id="f-phone" placeholder="010-0000-0000"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="flbl">지점</label>
        <select class="finp" id="f-branch" onchange="updateTypeOpts()">
          <option value="목동">테니스(목동)</option>
          <option value="용인">골프(용인)</option>
        </select>
      </div>
      <div class="fg"><label class="flbl">유형</label><select class="finp" id="f-type"><option>동호인</option><option>선수</option><option>그룹</option></select></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="flbl">총 회차</label><input class="finp" type="number" id="f-total" value="10"></div>
      <div class="fg"><label class="flbl">잔여 회차</label><input class="finp" type="number" id="f-remain" value="10"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="flbl">결제금액</label><input class="finp" type="number" id="f-payment" placeholder="300000"></div>
      <div class="fg"><label class="flbl">결제일</label><input class="finp" type="date" id="f-paydate"></div>
    </div>
    <div class="fg"><label class="flbl">결제 방법</label>
      <div class="pm-row">
        <button type="button" class="pm-btn" id="pm-카드" onclick="selPay('카드')">카드</button>
        <button type="button" class="pm-btn" id="pm-현금" onclick="selPay('현금')">현금</button>
        <button type="button" class="pm-btn" id="pm-계좌이체" onclick="selPay('계좌이체')">계좌이체</button>
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label class="flbl">트레이닝 요일</label><input class="finp" id="f-days" placeholder="월,수,금"></div>
      <div class="fg"><label class="flbl">트레이닝 시간</label><input class="finp" id="f-time" placeholder="10:00"></div>
    </div>
    <div class="fg"><label class="flbl">상태</label><select class="finp" id="f-status"><option>활성</option><option>일시정지</option><option>종료</option></select></div>
    <div class="mact"><button class="btn" onclick="closeM('m-member')">취소</button><button class="btn btn-t" onclick="saveMember()">저장</button></div>
  </div>
</div>

<!-- 인솔 모달 -->
<div class="mbg" id="m-insole">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtit"><span class="mdot" style="background:var(--insole)"></span><span id="m-insole-tit">인솔 등록</span></div>
    <div class="fg"><label class="flbl">회원 이름 <span style="color:var(--insole);font-size:9px">자동완성</span></label>
      <div class="acw"><input class="finp" id="ins-name" placeholder="이름 입력..." autocomplete="off" oninput="acInput()" onblur="setTimeout(hideAc,180)">
      <div class="acl" id="ac-list"></div></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="flbl">연락처</label><input class="finp" id="ins-phone"></div>
      <div class="fg"><label class="flbl">지점</label><select class="finp" id="ins-branch"><option value="목동">테니스(목동)</option><option value="용인">골프(용인)</option></select></div>
    </div>

<script>
var DAYS = ['일','월','화','수','목','금','토'];
var STEPS = ['접수','측정','제작중','전달완료'];
var PERF = {
  tennis: ['스피드','파워','민첩성','밸런스','지구력'],
  golf:   ['파워','밸런스','유연성','안정성','지구력']
};
var today = new Date();
var curBranch = 'tennis', curTab = 'dash';
var calY = today.getFullYear(), calM = today.getMonth(), calSelDay = today.getDate();
var editMemberIdx = -1, editInsoleIdx = -1, pipeFilter = '', curPay = '';
var perfData = {};
var members = [], insoles = [], transactions = [];

// ══ API 통신 ══
var API = 'https://script.google.com/macros/s/AKfycbxWHEMu3InNcJYQfekKNyOkNJrbv3C4WDAkUrPZznbDkY6esEeGhqjEjnVDPDGkNheuZg/exec';

function apiGet(action, cb) {
  // JSONP 방식 - CORS 문제 없이 Apps Script 호출
  var cbName = '_cb' + Date.now();
  var script = document.createElement('script');
  var done = false;
  var timer = setTimeout(function(){
    if(!done){ done=true; delete window[cbName]; script.remove(); cb('시간 초과'); }
  }, 10000);
  window[cbName] = function(res){
    if(done) return; done=true;
    clearTimeout(timer); delete window[cbName]; script.remove();
    if(res && res.ok) cb(null, res.data);
    else cb((res&&res.error)||'오류');
  };
  script.src = API + '?action=' + action + '&callback=' + cbName;
  document.head.appendChild(script);
}

function apiPost(body, cb) {
  fetch(API, {
    method: 'POST',
    body: JSON.stringify(body)
  })
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(null, d.data||{}); })
    .catch(function(e){ cb(null,{}); });
}

// ══ 동기화 ══
function syncAll() {
  var btn = document.getElementById('sync-btn');
  var lbl = document.getElementById('sync-lbl');
  btn.classList.add('going'); lbl.textContent = '로딩중';
  apiGet('getAll', function(err, data) {
    btn.classList.remove('going'); lbl.textContent = '동기화';
    if(err) { toast('연결 오류: ' + err); return; }
    members = (data.students||[]).map(normMember);
    insoles = (data.insoles||[]).map(normInsole);
    transactions = data.transactions||[];
    toast('✓ 동기화 완료');
    checkDueBanner();
    render();
  });
}
function normMember(s) {
  s.total = parseInt(s.total)||0; s.remain = parseInt(s.remain)||0;
  s.payment = parseInt(s.payment)||0; s.paymethod = s.paymethod||'';
  return s;
}
function normInsole(i) {
  i.fee = parseInt(i.fee)||0;
  i.txLinked = (i.txLinked===true||i.txLinked==='TRUE');
  i.revdate = i.revdate||'';
  return i;
}

// ══ 필터 ══
function fM() {
  if(curBranch==='all') return members;
  var br = curBranch==='tennis'?'목동':'용인';
  return members.filter(function(s){ return s.branch===br||s.branch===curBranch; });
}
function fI() {
  if(curBranch==='all') return insoles;
  var br = curBranch==='tennis'?'목동':'용인';
  return insoles.filter(function(i){ return i.branch===br||i.branch===curBranch; });
}
function fT() {
  if(curBranch==='all') return transactions;
  var br = curBranch==='tennis'?'목동':'용인';
  return transactions.filter(function(t){ return t.branch===br||t.branch===curBranch; });
}
function brLbl(b) { return (b==='용인'||b==='golf')?'골프(용인)':'테니스(목동)'; }
function brColor(b) { return (b==='용인'||b==='golf')?'var(--golf)':'var(--tennis)'; }
function isGolf(b) { return b==='용인'||b==='golf'; }

// ══ 네비게이션 ══
function setBranch(b, el) {
  curBranch = b;
  document.querySelectorAll('.bpill').forEach(function(x){ x.className='bpill'; });
  el.className = 'bpill ' + (b==='tennis'?'bt':b==='golf'?'bg':'ba');
  render();
}
function gotoTab(t, el, type) {
  curTab = t;
  document.querySelectorAll('.ti').forEach(function(x){ x.className='ti'; });
  el.className = 'ti a' + type;
  var hb = document.getElementById('hdr-btns');
  if(t==='members') hb.innerHTML = '<button class="btn btn-sm btn-t" onclick="openMemberModal()">+ 회원 추가</button>';
  else if(t==='insole') hb.innerHTML = '<button class="btn btn-sm btn-i" onclick="openInsoleModal()">+ 인솔 등록</button>';
  else hb.innerHTML = '';
  render();
}
function render() {
  var map = {dash:renderDash, members:renderMembers, schedule:renderSchedule, revenue:renderRevenue, insole:renderInsole, perf:renderPerf};
  (map[curTab]||renderDash)();
}

// ══ 대시보드 ══
function renderDash() {
  var ms = fM(), ins = fI(), tx = fT();
  var active = ms.filter(function(s){ return s.status==='활성'; });
  var alerts = ms.filter(function(s){ return parseInt(s.remain)<=3&&s.status==='활성'; });
  var inProg = ins.filter(function(i){ return i.status!=='전달완료'; });
  var tRev = tx.filter(function(t){ return t.source==='트레이닝'||t.source==='레슨'; }).reduce(function(a,b){ return a+(parseInt(b.amount)||0); },0);
  var iRev = tx.filter(function(t){ return t.source==='인솔'; }).reduce(function(a,b){ return a+(parseInt(b.amount)||0); },0);
  var todayMs = getTodayMembers();
  var html = '<div class="sgrid">';
  html += '<div class="sbox st"><div class="slbl">활성 회원</div><div class="sval">'+active.length+'<span style="font-size:13px">명</span></div><div class="ssub">전체 '+ms.length+'명</div></div>';
  html += '<div class="sbox st"><div class="slbl">트레이닝비</div><div class="sval">'+Math.round(tRev/10000)+'<span style="font-size:13px">만</span></div><div class="ssub">누적</div></div>';
  html += '<div class="sbox si"><div class="slbl">인솔 수입</div><div class="sval">'+Math.round(iRev/10000)+'<span style="font-size:13px">만</span></div><div class="ssub">누적</div></div>';
  var revCount = fI().filter(function(i){
    if(!i.revdate) return false;
    var diff = Math.ceil((new Date(i.revdate) - new Date())/(1000*60*60*24));
    return diff <= 7;
  }).length;
  html += '<div class="sbox si"><div class="slbl">수정 임박</div><div class="sval" style="color:'+(revCount>0?'var(--warn)':'var(--insole-d)')+'">'+revCount+'<span style="font-size:13px">건</span></div><div class="ssub">D-7 이하</div></div>';
  html += '</div>';
  html += '<div class="card ct"><div class="ctit">오늘 트레이닝 <span style="font-size:11px;color:var(--muted)">'+(today.getMonth()+1)+'/'+today.getDate()+' '+DAYS[today.getDay()]+'요일</span></div>';
  if(!todayMs.length) html += '<div class="empty">오늘 트레이닝 없음</div>';
  else todayMs.forEach(function(s){
    var idx = members.indexOf(s);
    var att = s._att||'', done = s._done||false;
    var golf = isGolf(s.branch);
    html += '<div class="lcard '+(golf?'golf':'')+'">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html += '<div class="av '+(golf?'av-g':'av-t')+'">'+s.name[0]+'</div>';
    html += '<div style="flex:1"><div style="font-size:14px;font-weight:600">'+s.name+'</div>';
    html += '<div style="font-size:11px;color:var(--muted)">'+s.time+' · '+s.type+' · 잔여 <strong>'+s.remain+'회</strong></div></div>';
    html += '<span class="bdg '+(done?'b-end':parseInt(s.remain)<=3?'b-pse':'b-act')+'">'+(done?'완료':s.remain+'회')+'</span></div>';
    html += '<div class="att-row">';
    ['출석','결석','보강'].forEach(function(a){
      html += '<button class="att-btn '+(att===a?'s-'+a:'')+'" onclick="setAtt('+idx+',\''+a+'\')">'+a+'</button>';
    });
    html += '</div>';
    html += '<input type="text" class="finp" style="font-size:12px;padding:6px 10px;margin-bottom:6px" placeholder="메모" value="'+(s._memo||'')+'" onchange="members['+idx+']._memo=this.value">';
    html += '<button class="done-btn '+(golf?'golf':'')+'" '+(done?'disabled':'')+' onclick="completeTrain('+idx+')">'+(done?'✓ 완료됨':'트레이닝 완료 (회차 차감)')+'</button>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div class="card ct"><div class="ctit">회차 주의 <span style="font-size:11px;color:var(--danger)">'+alerts.length+'명</span></div>';
  if(!alerts.length) html += '<div class="empty">주의 대상 없음</div>';
  else alerts.forEach(function(s){ html += '<div class="alrow"><span style="font-weight:600">'+s.name+'</span><span>잔여 <strong>'+s.remain+'회</strong></span><span style="color:var(--muted);font-size:10px">'+s.days+' '+s.time+'</span></div>'; });
  html += '</div>';
  // 수정 임박 (D-7 이하)
  var now = new Date();
  var revAlerts = fI().filter(function(i){
    if(!i.revdate) return false;
    var diff = Math.ceil((new Date(i.revdate) - now)/(1000*60*60*24));
    return diff <= 7;
  }).sort(function(a,b){
    return new Date(a.revdate) - new Date(b.revdate);
  });
  html += '<div class="card ci"><div class="ctit">인솔 수정 임박 <span style="font-size:11px;color:var(--warn)">D-7 이하</span></div>';
  if(!revAlerts.length) html += '<div class="empty">수정 임박 없음</div>';
  else revAlerts.forEach(function(i){
    var diff = Math.ceil((new Date(i.revdate) - now)/(1000*60*60*24));
    var label = diff < 0 ? '수정 기한 초과!' : diff === 0 ? '오늘 수정!' : 'D-'+diff;
    var col = diff < 0 ? 'var(--danger)' : diff <= 3 ? 'var(--warn)' : 'var(--insole)';
    html += '<div class="revcard">';
    html += '<div style="display:flex;align-items:center;gap:8px">';
    html += '<div class="av av-i">'+i.name[0]+'</div>';
    html += '<div style="flex:1"><div style="font-size:13px;font-weight:600">'+i.name+'</div>';
    html += '<div style="font-size:11px;color:var(--muted)">수정 예약일: '+i.revdate+'</div></div>';
    html += '<div style="text-align:right"><span style="font-size:14px;font-weight:700;color:'+col+'">'+label+'</span><br>';
    html += '<button class="btn btn-xs" style="margin-top:3px" onclick="openInsoleStatus('+insoles.indexOf(i)+')">예약수정</button></div>';
    html += '</div></div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}
function getTodayMembers() {
  var d = DAYS[today.getDay()];
  return fM().filter(function(s){ return s.status!=='종료'&&s.days&&s.days.split(',').map(function(x){return x.trim();}).indexOf(d)>=0; });
}
function setAtt(idx, a) { members[idx]._att = a; renderDash(); }
function completeTrain(idx) {
  var s = members[idx];
  if(s._done) return;
  if(!s._att) { toast('출석 상태를 먼저 선택하세요'); return; }
  if(s._att==='출석'||s._att==='보강') {
    var nr = Math.max(0, parseInt(s.remain)-1);
    members[idx].remain = nr;
    apiPost({action:'saveStudent',data:members[idx]}, function(){ toast('✓ '+s.name+' 완료 · 잔여 '+nr+'회'); });
  } else { toast('✓ '+s.name+' 결석 처리'); }
  members[idx]._done = true;
  renderDash();
}

// ══ 회원 목록 ══
function renderMembers() {
  var html = '<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn btn-t btn-sm" onclick="openMemberModal()">+ 회원 추가</button></div>';
  html += '<div class="sbar"><input class="sinp" id="sq" placeholder="이름 검색..." oninput="renderMembers()"><select class="ssel" id="sf" onchange="renderMembers()"><option value="">전체</option><option>활성</option><option>일시정지</option><option>종료</option></select></div>';
  document.getElementById('content').innerHTML = html;
  var q = (document.getElementById('sq')||{}).value||'';
  var sf = (document.getElementById('sf')||{}).value||'';
  var ms = fM().filter(function(s){ return (!q||s.name.indexOf(q)>=0)&&(!sf||s.status===sf); });
  var list = '<div class="card" style="padding:0 14px">';
  if(!ms.length) list += '<div class="empty">회원 없음</div>';
  else ms.forEach(function(s){
    var pct = s.total>0?Math.round((s.total-s.remain)/s.total*100):0;
    var pcls = parseInt(s.remain)<=2?'low':parseInt(s.remain)<=5?'mid':'';
    var golf = isGolf(s.branch);
    var pmBdg = s.paymethod?'<span class="bdg b-'+s.paymethod+'" style="font-size:9px;margin-left:4px">'+s.paymethod+'</span>':'';
    list += '<div class="li">';
    list += '<div class="av '+(golf?'av-g':'av-t')+'">'+s.name[0]+'</div>';
    list += '<div class="im"><div class="in">'+s.name+' <span class="bdg b-end" style="font-size:9px">'+s.type+'</span>'+pmBdg+'</div>';
    list += '<div class="is">'+s.phone+' · '+brLbl(s.branch)+'</div>';
    list += '<div class="prog"><div class="prog-f '+pcls+'" style="width:'+pct+'%"></div></div></div>';
    list += '<div class="ir"><span class="bdg '+(s.status==='활성'?'b-act':s.status==='일시정지'?'b-pse':'b-end')+'">'+s.status+'</span><br>';
    list += '<button class="btn btn-xs" style="margin-top:5px" onclick="openMemberEdit('+members.indexOf(s)+')">수정</button></div>';
    list += '</div>';
  });
  list += '</div>';
  document.getElementById('content').innerHTML += list;
}

// ══ 스케줄 ══
function renderSchedule() {
  var html = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">';
  html += '<button class="btn btn-sm" onclick="calM--;if(calM<0){calM=11;calY--;}renderSchedule()">←</button>';
  html += '<span style="flex:1;text-align:center;font-size:14px;font-weight:600">'+calY+'년 '+(calM+1)+'월</span>';
  html += '<button class="btn btn-sm" onclick="calM++;if(calM>11){calM=0;calY++;}renderSchedule()">→</button></div>';
  html += '<div class="cal-hdr">';
  DAYS.forEach(function(d,i){ html += '<div class="cal-dlbl" style="color:'+(i===0?'var(--danger)':i===6?'var(--golf)':'var(--muted)')+'">'+d+'</div>'; });
  html += '</div><div class="cal-grid">';
  var first = new Date(calY,calM,1).getDay(), dim = new Date(calY,calM+1,0).getDate();
  for(var i=0;i<first;i++) html += '<div></div>';
  for(var d=1;d<=dim;d++){
    var isTd = calY===today.getFullYear()&&calM===today.getMonth()&&d===today.getDate();
    var dow = new Date(calY,calM,d).getDay();
    var ms2 = fM().filter(function(s){ return s.status!=='종료'&&s.days&&s.days.split(',').map(function(x){return x.trim();}).indexOf(DAYS[dow])>=0; });
    var dots = ms2.slice(0,2).map(function(s){ return '<div class="cal-dot" style="color:'+brColor(s.branch)+'">'+s.name[0]+' '+s.time+'</div>'; }).join('');
    if(ms2.length>2) dots += '<div class="cal-dot" style="color:var(--muted)">+'+(ms2.length-2)+'</div>';
    var dd=d;
    html += '<div class="cal-cell" style="'+(isTd?'border-color:var(--tennis)':'')+'" onclick="selDay('+dd+','+dow+')">';
    html += '<div class="cal-num '+(isTd?'td':'')+'" style="'+(isTd?'':'color:'+(dow===0?'var(--danger)':dow===6?'var(--golf)':'var(--text)'))+'">'+(isTd?'<span style="color:#fff;font-size:10px">'+d+'</span>':d)+'</div>';
    html += dots+'</div>';
  }
  html += '</div>';
  html += '<div class="card ct" style="margin-top:12px" id="sel-day-card"><div class="ctit">날짜를 선택하세요</div></div>';
  document.getElementById('content').innerHTML = html;
}
function selDay(d, dow) {
  calSelDay = d;
  var isTd = calY===today.getFullYear()&&calM===today.getMonth()&&d===today.getDate();
  var ms2 = fM().filter(function(s){ return s.status!=='종료'&&s.days&&s.days.split(',').map(function(x){return x.trim();}).indexOf(DAYS[dow])>=0; });
  ms2.sort(function(a,b){ return a.time.localeCompare(b.time); });
  var html = '<div class="ctit">'+(calM+1)+'월 '+d+'일 '+DAYS[dow]+'요일 <span style="font-size:11px;color:var(--muted)">'+ms2.length+'명</span></div>';
  if(!ms2.length) html += '<div class="empty">트레이닝 없음</div>';
  else if(isTd) {
    ms2.forEach(function(s){
      var idx = members.indexOf(s);
      var att = s._att||'', done = s._done||false;
      var golf = isGolf(s.branch);
      html += '<div class="lcard '+(golf?'golf':'')+'">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div class="av '+(golf?'av-g':'av-t')+'">'+s.name[0]+'</div>';
      html += '<div style="flex:1"><div style="font-size:14px;font-weight:600">'+s.name+'</div><div style="font-size:11px;color:var(--muted)">'+s.time+' · 잔여 <strong>'+s.remain+'회</strong></div></div>';
      html += '<span class="bdg '+(done?'b-end':parseInt(s.remain)<=3?'b-pse':'b-act')+'">'+(done?'완료':s.remain+'회')+'</span></div>';
      html += '<div class="att-row">';
      ['출석','결석','보강'].forEach(function(a){ html += '<button class="att-btn '+(att===a?'s-'+a:'')+'" onclick="setAttCal('+idx+',\''+a+'\','+d+','+dow+')">'+a+'</button>'; });
      html += '</div>';
      html += '<button class="done-btn '+(golf?'golf':'')+'" '+(done?'disabled':'')+' onclick="completeTrainCal('+idx+','+d+','+dow+')">'+(done?'✓ 완료됨':'트레이닝 완료 (회차 차감)')+'</button>';
      html += '</div>';
    });
  } else {
    ms2.forEach(function(s){ html += '<div class="li"><div class="av '+(isGolf(s.branch)?'av-g':'av-t')+'">'+s.name[0]+'</div><div class="im"><div class="in">'+s.name+'</div><div class="is">'+s.type+' · 잔여 '+s.remain+'회</div></div><div class="ir" style="font-size:13px;font-weight:600">'+s.time+'</div></div>'; });
  }
  var card = document.getElementById('sel-day-card');
  if(card) card.innerHTML = html;
}
function setAttCal(idx, a, d, dow) { members[idx]._att = a; selDay(d, dow); }
function completeTrainCal(idx, d, dow) {
  var s = members[idx];
  if(s._done) return;
  if(!s._att) { toast('출석 상태를 먼저 선택하세요'); return; }
  if(s._att==='출석'||s._att==='보강') {
    var nr = Math.max(0, parseInt(s.remain)-1);
    members[idx].remain = nr;
    apiPost({action:'saveStudent',data:members[idx]}, function(){ toast('✓ '+s.name+' 완료 · 잔여 '+nr+'회'); });
  } else { toast('✓ '+s.name+' 결석 처리'); }
  members[idx]._done = true;
  selDay(d, dow);
}

// ══ 매출 ══
function renderRevenue() {

  html += '<div class="sbox si"><div class="slbl">인솔 수입</div><div class="sval">'+Math.round(iRev/10000)+'<span style="font-size:13px">만</span></div></div>';

  html += '<div class="sbox sn"><div class="slbl">순이익</div><div class="sval">'+Math.round((total-exp)/10000)+'<span style="font-size:13px">만</span></div><div class="ssub">지출 '+Math.round(exp/10000)+'만</div></div>';
  html += '</div>';

  months.forEach(function(m){

    if(vi>maxI)maxI=vi;
  });
  html += '<div class="card ct"><div class="ctit">월별 트레이닝비</div>';
  months.forEach(function(m){
    var v=tx.filter(function(t){ return (t.source==='트레이닝'||t.source==='레슨')&&String(t.date).indexOf('-'+m+'-')>=0&&String(t.date).indexOf(curYs)===0; }).reduce(function(a,b){return a+(parseInt(b.amount)||0);},0);
    if(!v)return;
    var p=Math.round(v/maxT*100);
    html += '<div class="brow"><span class="blbl">'+parseInt(m)+'월</span><div class="btrack"><div class="bfill" style="width:'+p+'%;background:var(--tennis)">'+(p>20?Math.round(v/10000)+'만':'')+'</div></div><span class="bnum">'+Math.round(v/10000)+'만</span></div>';
  });
  html += '</div>';
  html += '<div class="card ci"><div class="ctit">월별 인솔 수입</div>';
  months.forEach(function(m){
    var v=tx.filter(function(t){ return t.source==='인솔'&&String(t.date).indexOf('-'+m+'-')>=0&&String(t.date).indexOf(curYs)===0; }).reduce(function(a,b){return a+(parseInt(b.amount)||0);},0);
    if(!v)return;
    var p=Math.round(v/maxI*100);
    html += '<div class="brow"><span class="blbl">'+parseInt(m)+'월</span><div class="btrack"><div class="bfill" style="width:'+p+'%;background:var(--insole)">'+(p>20?Math.round(v/10000)+'만':'')+'</div></div><span class="bnum">'+Math.round(v/10000)+'만</span></div>';
  });
  html += '</div>';
  html += '<div class="card"><div class="ctit">전체 내역</div>';
  tx.slice().sort(function(a,b){ return String(b.date).localeCompare(String(a.date)); }).forEach(function(t){
    var src = t.source;
    var isInc = src!=='지출';
    var bcls = (src==='트레이닝'||src==='레슨')?'b-트레이닝':src==='인솔'?'b-인솔':'b-지출';
    var lbl = (src==='트레이닝'||src==='레슨')?'트레이닝':src==='인솔'?'인솔':'지출';
    var rowbg = (src==='트레이닝'||src==='레슨')?'var(--tennis-l)':src==='인솔'?'var(--insole-l)':'';
    html += '<div class="li" style="background:'+rowbg+';margin:0 -14px;padding:9px 14px">';
    html += '<div class="im"><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span class="bdg '+bcls+'">'+lbl+'</span><span style="font-size:13px;font-weight:500">'+t.item+'</span></div>';
    html += '<div style="font-size:11px;color:var(--muted)">'+t.date+' · '+brLbl(t.branch)+'</div></div>';

// ══ 인솔 ══
function renderInsole() {
  var ins = fI();
  var cnt = {};
  STEPS.forEach(function(s){ cnt[s]=0; });
  ins.forEach(function(i){ cnt[i.status]=(cnt[i.status]||0)+1; });
  var inProg = ins.filter(function(i){ return i.status!=='전달완료'; });
  var txFee = fT().filter(function(t){ return t.source==='인솔'; }).reduce(function(a,b){ return a+(parseInt(b.amount)||0); },0);
  var html = '<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn btn-i btn-sm" onclick="openInsoleModal()">+ 인솔 등록</button></div>';
  html += '<div class="sgrid">';
  html += '<div class="sbox si"><div class="slbl">진행 중</div><div class="sval" style="color:var(--insole-d)">'+inProg.length+'<span style="font-size:13px">건</span></div></div>';
  html += '<div class="sbox si"><div class="slbl">매출 반영</div><div class="sval">'+Math.round(txFee/10000)+'<span style="font-size:13px">만</span></div></div>';
  html += '<div class="sbox sn"><div class="slbl">전달 완료</div><div class="sval" style="color:var(--success)">'+(cnt['전달완료']||0)+'<span style="font-size:13px">건</span></div></div>';
  html += '<div class="sbox sn"><div class="slbl">전체</div><div class="sval">'+ins.length+'<span style="font-size:13px">건</span></div></div>';
  html += '</div>';
  html += '<div class="pipe">';
  ['','접수','측정','제작중','전달완료'].forEach(function(s,i){
    var lbl=i===0?'전체':s, cnt2=i===0?ins.length:(cnt[s]||0);
    html += '<button class="pb '+(pipeFilter===s?'act':'')+'" onclick="pipeFilter=\''+s+'\';renderInsole()"><span class="pn">'+cnt2+'</span>'+lbl+'</button>';
  });
  html += '</div>';
  var list = pipeFilter ? ins.filter(function(i){ return i.status===pipeFilter; }) : ins;
  if(!list.length) { html += '<div class="empty">해당 인솔 없음</div>'; document.getElementById('content').innerHTML=html; return; }
  list.forEach(function(ins2){
    var si = STEPS.indexOf(ins2.status);
    var stepH = STEPS.map(function(s,i){ return (i>0?'<div class="sl '+(i<=si?'done':'')+'"></div>':'')+'<div class="sd '+(i<si?'done':i===si?'cur':'')+'">'+( i+1)+'</div>'; }).join('');
    var txTag = ins2.txLinked?'<span class="bdg b-트레이닝" style="font-size:9px">매출반영</span>':'<span class="bdg b-end" style="font-size:9px">미반영</span>';
    var od = ins2.due&&new Date(ins2.due)<today&&ins2.status!=='전달완료';
    var ri = insoles.indexOf(ins2);
    html += '<div class="icard">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">';
    html += '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:14px;font-weight:700">'+ins2.name+'</span><span style="font-size:11px;color:'+brColor(ins2.branch)+'">'+brLbl(ins2.branch)+'</span>'+txTag+'</div>';
    html += '<div style="display:flex;gap:4px"><span class="bdg b-'+ins2.status+'">'+ins2.status+'</span><button class="btn btn-xs" onclick="openInsoleStatus('+ri+')">상태</button><button class="btn btn-xs" onclick="openInsoleEdit('+ri+')">수정</button></div></div>';
    var nowD = new Date();
    var revDiff = ins2.revdate ? Math.ceil((new Date(ins2.revdate)-nowD)/(1000*60*60*24)) : null;
    var revLabel = revDiff !== null ? (revDiff<0?'수정기한초과':revDiff===0?'오늘수정':'수정 D-'+revDiff) : '';
    var revColor = revDiff !== null ? (revDiff<0?'var(--danger)':revDiff<=7?'var(--warn)':'var(--insole)') : '';
    html += '<div style="font-size:11px;color:var(--muted);margin-bottom:8px">'+ins2.phone+' · 접수 '+ins2.date+' · 납기 <span style="color:'+(od?'var(--danger)':'var(--text)')+';font-weight:'+(od?'600':'400')+'">'+ins2.due+(od?' ⚠':'')+'</span>'+(ins2.revdate?'&nbsp;·&nbsp;<span style="color:'+revColor+';font-weight:600">'+revLabel+'</span>':'')+'</div>';
    html += '<div class="igrid">';
    html += '<div class="ibox"><div class="ilbl">발 사이즈</div><div class="ival">'+ins2.size+'mm</div></div>';
    html += '<div class="ibox"><div class="ilbl">아치</div><div class="ival">'+(ins2.arch||'-')+'</div></div>';
    html += '<div class="ibox"><div class="ilbl">소재</div><div class="ival">'+(ins2.material||'-')+'</div></div>';
    if(ins2.rx) html += '<div class="ibox wide"><div class="ilbl">처방</div><div class="ival">'+ins2.rx+'</div></div>';
    if(ins2.memo) html += '<div class="ibox wide"><div class="ilbl">메모</div><div class="ival" style="color:var(--muted)">'+ins2.memo+'</div></div>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px"><div class="steps">'+stepH+'</div><span style="font-size:14px;font-weight:700;color:var(--insole-d)">'+Math.round(ins2.fee/10000)+'만원</span></div>';
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;
}

// ══ 퍼포먼스 평가 ══
function renderPerf() {
  var ms2 = fM().filter(function(s){ return s.status!=='종료'; });
  var items = curBranch==='golf' ? PERF.golf : PERF.tennis;
  var brName = curBranch==='golf'?'골프(용인)':'테니스(목동)';
  var html = '<div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--muted)">퍼포먼스 평가 · '+brName+'</div>';
  if(!ms2.length) { html += '<div class="empty">회원 없음</div>'; document.getElementById('content').innerHTML=html; return; }
  ms2.forEach(function(s){
    var sid = String(s.id);
    if(!perfData[sid]) perfData[sid]={scores:{},memo:'',date:today.toISOString().slice(0,10)};
    var pd = perfData[sid];
    var golf = isGolf(s.branch);
    html += '<div class="perf-card">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div class="av '+(golf?'av-g':'av-t')+'">'+s.name[0]+'</div>';
    html += '<div><div style="font-size:14px;font-weight:600">'+s.name+'</div><div style="font-size:11px;color:var(--muted)">'+s.type+'</div></div></div>';
    items.forEach(function(item){
      var val = pd.scores[item]!==undefined?pd.scores[item]:5;
      var col = val>=8?'var(--tennis)':val>=5?'var(--warn)':'var(--danger)';
      html += '<div style="margin-bottom:10px">';
      html += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="font-weight:500">'+item+'</span><span id="pv-'+sid+'-'+item+'" style="font-weight:700;color:'+col+'">'+val+'</span></div>';
      html += '<input type="range" min="1" max="10" value="'+val+'" step="1" style="width:100%" oninput="updPerf(\''+sid+'\',\''+item+'\',this.value)">';
      html += '</div>';
    });
    html += '<textarea class="finp" style="font-size:12px;padding:6px 10px;margin-bottom:8px" rows="2" placeholder="평가 메모..." onchange="if(!perfData[\''+sid+'\'])perfData[\''+sid+'\']={}; perfData[\''+sid+'\'].memo=this.value">'+(pd.memo||'')+'</textarea>';
    html += '<div style="display:flex;gap:8px"><input type="date" class="finp" style="flex:1;font-size:12px;padding:6px 10px" value="'+(pd.date||today.toISOString().slice(0,10))+'" onchange="if(!perfData[\''+sid+'\'])perfData[\''+sid+'\']={}; perfData[\''+sid+'\'].date=this.value">';
    html += '<button class="btn '+(golf?'btn-g':'btn-t')+'" style="font-size:12px" onclick="savePerf(\''+sid+'\',\''+s.name+'\')">저장</button></div>';
    html += '<div class="perf-bar-wrap">';
    items.forEach(function(item){
      var val = pd.scores[item]!==undefined?pd.scores[item]:5;
      var col = val>=8?'var(--tennis)':val>=5?'var(--warn)':'var(--danger)';
      html += '<div class="perf-bar-col"><div class="perf-bar" id="pb-'+sid+'-'+item+'" style="height:'+Math.round(val/10*100)+'%;background:'+col+'"></div><div class="perf-lbl">'+item.slice(0,2)+'</div></div>';
    });
    html += '</div></div>';
  });
  document.getElementById('content').innerHTML = html;
}
function updPerf(sid, item, val) {
  val = parseInt(val);
  if(!perfData[sid]) perfData[sid]={scores:{},memo:'',date:today.toISOString().slice(0,10)};
  perfData[sid].scores[item] = val;
  var col = val>=8?'var(--tennis)':val>=5?'var(--warn)':'var(--danger)';
  var el = document.getElementById('pv-'+sid+'-'+item);
  if(el){el.textContent=val;el.style.color=col;}
  var bar = document.getElementById('pb-'+sid+'-'+item);
  if(bar){bar.style.height=Math.round(val/10*100)+'%';bar.style.background=col;}
}
function savePerf(sid, name) {
  if(!perfData[sid]||!Object.keys(perfData[sid].scores).length){toast('점수를 입력하세요');return;}
  toast('✓ '+name+' 퍼포먼스 평가 저장됨');
}

function saveMember() {
  var n=document.getElementById('f-name').value.trim(); if(!n){toast('이름을 입력하세요');return;}
  var pay=parseInt(document.getElementById('f-payment').value)||0;
  var data={
    id: editMemberIdx>=0?members[editMemberIdx].id:String(Date.now()),
    name:n, phone:document.getElementById('f-phone').value,
    branch:document.getElementById('f-branch').value,
    type:document.getElementById('f-type').value,
    total:parseInt(document.getElementById('f-total').value)||10,
    remain:parseInt(document.getElementById('f-remain').value)||0,
    payment:pay, paydate:document.getElementById('f-paydate').value,
    paymethod:curPay,
    days:document.getElementById('f-days').value, time:document.getElementById('f-time').value,
    status:document.getElementById('f-status').value
  };
  toast('저장 중…');
  apiPost({action:'saveStudent',data:data}, function(err){
    if(err){toast('오류: '+err);return;}
    if(editMemberIdx>=0) members[editMemberIdx]=normMember(data);
    else {
      members.push(normMember(data));
      if(pay>0){
        var pm=curPay?' ['+curPay+']':'';
        var tx={id:String(Date.now()+1),date:data.paydate,source:'트레이닝',item:n+' 트레이닝비'+pm,amount:pay,branch:data.branch};
        apiPost({action:'saveTx',data:tx},function(){});
        transactions.push(tx);
      }
    }
    closeM('m-member'); toast('✓ 저장됐습니다'); render();
  });
}
function updateTypeOpts() {
  var br = document.getElementById('f-branch');
  var tp = document.getElementById('f-type');
  if(!br||!tp) return;
  var isGolf2 = br.value==='용인';
  var opts = isGolf2?['일반','그룹']:['동호인','선수','그룹'];
  var cur = tp.value;
  tp.innerHTML = opts.map(function(o){ return '<option'+(o===cur?' selected':'')+'>'+o+'</option>'; }).join('');
}

function openInsoleModal() {
  editInsoleIdx=-1;
  document.getElementById('m-insole-tit').textContent='인솔 등록';
  ['ins-name','ins-phone','ins-size','ins-rx','ins-memo'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('ins-fee').value='';
  document.getElementById('ins-branch').value=curBranch==='golf'?'용인':'목동';
  document.getElementById('ins-date').value=today.toISOString().slice(0,10);
  document.getElementById('ins-due').value='';
  document.getElementById('ins-revdate').value='';
  openM('m-insole');
}
function openInsoleEdit(idx) {
  editInsoleIdx=idx; var i=insoles[idx];
  document.getElementById('m-insole-tit').textContent=i.name+' 수정';
  document.getElementById('ins-name').value=i.name; document.getElementById('ins-phone').value=i.phone;
  document.getElementById('ins-branch').value=(i.branch==='yongin'||i.branch==='golf')?'용인':'목동';
  document.getElementById('ins-date').value=i.date; document.getElementById('ins-size').value=i.size;
  document.getElementById('ins-arch').value=i.arch; document.getElementById('ins-mat').value=i.material;
  document.getElementById('ins-fee').value=i.fee; document.getElementById('ins-due').value=i.due;
  document.getElementById('ins-rx').value=i.rx; document.getElementById('ins-memo').value=i.memo;
  document.getElementById('ins-revdate').value=i.revdate||'';
  openM('m-insole');
}
function saveInsole() {
  var n=document.getElementById('ins-name').value.trim(); if(!n){toast('이름을 입력하세요');return;}
  var data={
    id:editInsoleIdx>=0?insoles[editInsoleIdx].id:String(Date.now()),
    name:n, phone:document.getElementById('ins-phone').value,
    branch:document.getElementById('ins-branch').value,
    date:document.getElementById('ins-date').value,
    size:document.getElementById('ins-size').value,
    arch:document.getElementById('ins-arch').value,
    material:document.getElementById('ins-mat').value,
    fee:parseInt(document.getElementById('ins-fee').value)||0,
    due:document.getElementById('ins-due').value,
    rx:document.getElementById('ins-rx').value,
    memo:document.getElementById('ins-memo').value,
    status:editInsoleIdx>=0?insoles[editInsoleIdx].status:'접수',
    txLinked:editInsoleIdx>=0?insoles[editInsoleIdx].txLinked:false,
    revdate:document.getElementById('ins-revdate').value
  };
  toast('저장 중…');
  apiPost({action:'saveInsole',data:data}, function(err){
    if(err){toast('오류: '+err);return;}
    if(editInsoleIdx>=0) insoles[editInsoleIdx]=normInsole(data);
    else insoles.push(normInsole(data));
    closeM('m-insole'); toast('✓ 저장됐습니다'); render();
  });
}
function openInsoleStatus(idx) {
  editInsoleIdx=idx;
  document.getElementById('m-ins-st-tit').textContent=insoles[idx].name+' 상태 변경';
  document.getElementById('ins-new-st').value=insoles[idx].status;
  document.getElementById('ins-st-memo').value='';
  document.getElementById('ins-st-revdate').value=insoles[idx].revdate||'';
  openM('m-ins-status');
}
function saveInsoleStatus() {
  if(editInsoleIdx<0) return;
  var ins=insoles[editInsoleIdx], newSt=document.getElementById('ins-new-st').value;
  var memo=document.getElementById('ins-st-memo').value;
  ins.status=newSt;
  if(memo) ins.memo=(ins.memo?ins.memo+' / ':'')+memo;
  var newRevdate = document.getElementById('ins-st-revdate').value;
  if(newRevdate) ins.revdate = newRevdate;
  if(newSt==='전달완료'&&!ins.txLinked) {
    ins.txLinked=true;
    var tx={id:String(Date.now()),date:today.toISOString().slice(0,10),source:'인솔',item:ins.name+' 인솔 제작비',amount:ins.fee,branch:ins.branch};
    apiPost({action:'saveTx',data:tx},function(){});
    transactions.push(tx);
  }
  toast('저장 중…');
  apiPost({action:'saveInsole',data:ins},function(err){
    if(err){toast('오류: '+err);return;}
    closeM('m-ins-status'); toast('✓ 상태 변경됐습니다'); render();
  });
}

// ══ 자동완성 ══
function acInput() {
  var q=document.getElementById('ins-name').value.trim();
  var list=document.getElementById('ac-list');
  if(!q){list.classList.remove('open');return;}
  var ms2=members.filter(function(s){return s.name.indexOf(q)>=0;});
  if(!ms2.length){list.classList.remove('open');return;}
  list.innerHTML=ms2.map(function(s){
    var br=(s.branch==='yongin'||s.branch==='golf')?'용인':'목동';
    return '<div class="aci" onclick="acSel(\''+s.name+'\',\''+s.phone+'\',\''+br+'\')"><div class="acn">'+s.name+'</div><div class="acs">'+s.phone+' · '+brLbl(s.branch)+' · '+s.type+'</div></div>';
  }).join('');
  list.classList.add('open');
}
function acSel(name,phone,branch) {
  document.getElementById('ins-name').value=name;
  document.getElementById('ins-phone').value=phone;
  document.getElementById('ins-branch').value=branch;
  document.getElementById('ac-list').classList.remove('open');
}
function hideAc(){var l=document.getElementById('ac-list');if(l)l.classList.remove('open');}

// ══ D-3 납기 배너 ══
function checkDueBanner() {
  var alerts=[];
  var now=new Date();
  insoles.forEach(function(i){
    if(i.status==='전달완료'||!i.due) return;
    var diff=Math.ceil((new Date(i.due)-now)/(1000*60*60*24));
    if(diff<=3) alerts.push({name:i.name,diff:diff});
  });
  var banner=document.getElementById('due-banner');
  if(!alerts.length){banner.style.display='none';return;}
  var txt=alerts.map(function(a){ return a.diff<0?'[납기초과] '+a.name:a.diff===0?'[오늘납기] '+a.name:'[D-'+a.diff+'] '+a.name; }).join('  ');
  document.getElementById('due-banner-text').textContent=txt;
  banner.style.display='flex';
}

// ══ 카카오 알림톡 ══
function openKakao() { openM('m-kakao'); showKakaoTpl(0); }
function showKakaoTpl(idx) {
  var ms2=fM().filter(function(s){return s.status==='활성';});
  var lowR=fM().filter(function(s){return parseInt(s.remain)<=3&&s.status==='활성';});
  var dueA=[];
  var now=new Date();
  insoles.forEach(function(i){
    if(i.status==='전달완료'||!i.due) return;
    var diff=Math.ceil((new Date(i.due)-now)/(1000*60*60*24));
    if(diff<=3) dueA.push({ins:i,diff:diff});
  });
  var area=document.getElementById('kakao-area');
  var html='';
  if(idx===0){
    html+='<div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">잔여 3회 이하 회원</div>';
    if(!lowR.length){html+='<div class="empty">해당 없음</div>';area.innerHTML=html;return;}
    lowR.forEach(function(s){
      var msg='[Fit to Play]\n안녕하세요, '+s.name+' 회원님!\n\n트레이닝 잔여 횟수가 '+s.remain+'회 남았습니다.\n재등록 문의 주시면 안내해 드리겠습니다.\n\n감사합니다 🎾';
      html+=makeKakaoCard(s.name,s.phone,msg);
    });
  } else if(idx===1){
    html+='<div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">납기 D-3 이하</div>';
    if(!dueA.length){html+='<div class="empty">해당 없음</div>';area.innerHTML=html;return;}
    dueA.forEach(function(a){
      var lbl=a.diff<0?'납기가 초과되었습니다':a.diff===0?'오늘이 납기일입니다':'납기까지 '+a.diff+'일 남았습니다';
      var msg='[Fit to Play]\n안녕하세요, '+a.ins.name+' 회원님!\n\n맞춤 인솔 '+lbl+'.\n📅 납기일: '+a.ins.due+'\n🔧 소재: '+a.ins.material+'\n\n수령 방법을 알려주세요!';
      html+=makeKakaoCard(a.ins.name,a.ins.phone,msg);
    });
  } else if(idx===2){
    html+='<div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">회원 선택</div>';
    html+='<select class="finp" id="kk-sel" onchange="updKakaoLesson()" style="margin-bottom:10px">';
    ms2.forEach(function(s,i){html+='<option value="'+i+'">'+s.name+' ('+s.days+' '+s.time+')</option>';});
    html+='</select><div id="kk-lesson-msg">';
    if(ms2[0]){
      var s=ms2[0];
      var msg='[Fit to Play]\n안녕하세요, '+s.name+' 회원님!\n\n트레이닝 등록이 완료되었습니다.\n\n📅 요일: '+(s.days||'-')+'\n⏰ 시간: '+(s.time||'-')+'\n🔢 회차: '+s.total+'회\n\n첫 트레이닝 때 뵙겠습니다! 💪';
      html+=makeKakaoCard(s.name,s.phone,msg);
    }
    html+='</div>';
  } else {
    var done=fI().filter(function(i){return i.status==='전달완료';});
    html+='<div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">전달완료 인솔</div>';
    if(!done.length){html+='<div class="empty">해당 없음</div>';area.innerHTML=html;return;}
    done.slice(0,3).forEach(function(i){
      var msg='[Fit to Play]\n안녕하세요, '+i.name+' 회원님!\n\n맞춤 인솔 제작이 완료됐습니다 ✅\n🔧 소재: '+i.material+'\n👟 사이즈: '+i.size+'mm\n\n수령 시간을 알려주세요!';
      html+=makeKakaoCard(i.name,i.phone,msg);
    });
  }
  area.innerHTML=html;
}
function makeKakaoCard(name,phone,msg) {
  return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;font-weight:600">'+name+'</span><span style="font-size:11px;color:var(--muted)">'+(phone||'')+'</span></div>'+
    '<div style="background:#FFCD0020;border:1px solid #FFCD00;border-radius:8px;padding:10px;font-size:12px;line-height:1.8;white-space:pre-wrap;margin-bottom:8px">'+msg+'</div>'+
    '<div style="display:flex;gap:6px">'+
    '<button class="btn btn-sm" style="flex:1" onclick="copyMsg(this)">복사</button>'+
    (phone?'<a href="sms:'+phone+'?body='+encodeURIComponent(msg)+'" style="flex:1"><button class="btn btn-sm" style="width:100%;background:#FFCD00;border-color:#FFCD00;color:#1C1C1A">문자 전송</button></a>':'')+
    '</div></div>';
}
function copyMsg(btn) {
  var msgEl = btn.parentElement.previousElementSibling;
  var txt = msgEl ? msgEl.textContent : '';
  if(navigator.clipboard) navigator.clipboard.writeText(txt).then(function(){toast('✓ 복사됐습니다');});
  else { var t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();toast('✓ 복사됐습니다'); }
}
function updKakaoLesson() {
  var sel=document.getElementById('kk-sel'); if(!sel)return;
  var ms2=fM().filter(function(s){return s.status==='활성';});
  var s=ms2[parseInt(sel.value)]; if(!s)return;
  var msg='[Fit to Play]\n안녕하세요, '+s.name+' 회원님!\n\n트레이닝 등록이 완료되었습니다.\n\n📅 요일: '+(s.days||'-')+'\n⏰ 시간: '+(s.time||'-')+'\n🔢 회차: '+s.total+'회\n\n첫 트레이닝 때 뵙겠습니다! 💪';
  document.getElementById('kk-lesson-msg').innerHTML=makeKakaoCard(s.name,s.phone,msg);
}

// ══ 리포트 ══
function openReport() {
  openM('m-report');
  var ySel=document.getElementById('rpt-y');
  var mSel=document.getElementById('rpt-m');
  if(!ySel.options.length) {
    var now=new Date();
    for(var y=now.getFullYear();y>=now.getFullYear()-2;y--){
      var o=document.createElement('option');o.value=y;o.textContent=y+'년';
      if(y===now.getFullYear())o.selected=true;ySel.appendChild(o);
    }
    for(var m=1;m<=12;m++){
      var o2=document.createElement('option');o2.value=m;o2.textContent=m+'월';
      if(m===now.getMonth()+1)o2.selected=true;mSel.appendChild(o2);
    }
  }
  renderReport();
}
function renderReport() {
  var y=parseInt(document.getElementById('rpt-y').value);
  var m=parseInt(document.getElementById('rpt-m').value);
  var br=document.getElementById('rpt-b').value;
  var ym=y+'-'+String(m).padStart(2,'0');
  var tx=transactions.filter(function(t){
    var tb=(t.branch==='golf'||t.branch==='yongin')?'용인':'목동';
    return String(t.date).indexOf(ym)===0&&(br==='all'||tb===br);
  });
  var tRev=tx.filter(function(t){return t.source==='트레이닝'||t.source==='레슨';}).reduce(function(a,b){return a+(parseInt(b.amount)||0);},0);
  var iRev=tx.filter(function(t){return t.source==='인솔';}).reduce(function(a,b){return a+(parseInt(b.amount)||0);},0);
  var exp=tx.filter(function(t){return t.source==='지출';}).reduce(function(a,b){return a+(parseInt(b.amount)||0);},0);
  var profit=tRev+iRev-exp;
  var ms2=br==='all'?members:members.filter(function(s){var sb=(s.branch==='golf'||s.branch==='yongin')?'용인':'목동';return sb===br;});
  var html='<div style="text-align:center;padding:14px 0;border-bottom:2px solid var(--border);margin-bottom:12px">';
  html+='<div style="font-size:17px;font-weight:700;color:var(--tennis)">Fit to Play</div>';
  html+='<div style="font-size:12px;color:var(--muted);margin-top:2px">'+y+'년 '+m+'월 정산 · '+(br==='all'?'전체':br)+'</div></div>';
  html+='<div class="sgrid">';
  html+='<div class="sbox st"><div class="slbl">트레이닝비</div><div class="sval">'+Math.round(tRev/10000)+'<span style="font-size:13px">만</span></div></div>';
  html+='<div class="sbox si"><div class="slbl">인솔 수입</div><div class="sval">'+Math.round(iRev/10000)+'<span style="font-size:13px">만</span></div></div>';
  html+='<div class="sbox sn"><div class="slbl">지출</div><div class="sval" style="color:var(--danger)">'+Math.round(exp/10000)+'<span style="font-size:13px">만</span></div></div>';
  html+='<div class="sbox sn"><div class="slbl">순이익</div><div class="sval" style="color:'+(profit>=0?'var(--success)':'var(--danger)')+'">'+Math.round(profit/10000)+'<span style="font-size:13px">만</span></div></div>';
  html+='</div>';
  html+='<div style="background:var(--bg);border-radius:var(--rs);padding:10px 12px;margin-bottom:12px;font-size:12px">';
  html+='회원 전체 '+ms2.length+'명 · 활성 '+ms2.filter(function(s){return s.status==='활성';}).length+'명</div>';
  html+='<div style="font-size:12px;font-weight:600;margin-bottom:8px">수입/지출 내역</div>';
  html+='<table style="width:100%;border-collapse:collapse;font-size:11px">';
  html+='<thead><tr style="background:var(--bg)"><th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)">날짜</th><th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)">구분</th><th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)">항목</th><th style="padding:6px 8px;text-align:right;border-bottom:1px solid var(--border)">금액</th></tr></thead><tbody>';
  tx.sort(function(a,b){return String(a.date).localeCompare(String(b.date));}).forEach(function(t){
    var isInc=t.source!=='지출';
    var src=(t.source==='트레이닝'||t.source==='레슨')?'트레이닝':t.source==='인솔'?'인솔':'지출';
    var bg=(t.source==='트레이닝'||t.source==='레슨')?'var(--tennis-l)':t.source==='인솔'?'var(--insole-l)':'';
    html+='<tr style="background:'+bg+'"><td style="padding:5px 8px;border-bottom:1px solid var(--border);color:var(--muted)">'+t.date+'</td>';
    html+='<td style="padding:5px 8px;border-bottom:1px solid var(--border)"><span class="bdg b-'+src+'">'+src+'</span></td>';
    html+='<td style="padding:5px 8px;border-bottom:1px solid var(--border)">'+t.item+'</td>';
    html+='<td style="padding:5px 8px;border-bottom:1px solid var(--border);text-align:right;font-weight:600;color:'+(isInc?'var(--success)':'var(--danger)')+'">'+( isInc?'+':'−')+Math.round((parseInt(t.amount)||0)/10000*10)/10+'만</td></tr>';
  });
  if(!tx.length) html+='<tr><td colspan="4" style="padding:16px;text-align:center;color:var(--muted)">이 달 내역 없음</td></tr>';
  html+='</tbody></table>';
  html+='<div style="margin-top:10px;padding-top:10px;border-top:2px solid var(--border);display:flex;justify-content:space-between;font-size:13px;font-weight:600"><span>합계</span><span style="color:'+(profit>=0?'var(--success)':'var(--danger)')+'">순이익 '+Math.round(profit/10000)+'만원</span></div>';
  document.getElementById('rpt-content').innerHTML=html;
}
function printReport() {
  var y=document.getElementById('rpt-y').value, m=document.getElementById('rpt-m').value, br=document.getElementById('rpt-b').value;
  var title=y+'년 '+m+'월 정산_'+(br==='all'?'전체':br);
  var w=window.open('','_blank');
  w.document.write('<html><head><meta charset="UTF-8"><title>'+title+'</title>');
  w.document.write('<style>body{font-family:sans-serif;padding:20px;max-width:600px;margin:0 auto}table{width:100%;border-collapse:collapse}th,td{padding:6px 8px;border-bottom:1px solid #eee}@media print{button{display:none}}</style>');
  w.document.write('</head><body><h2 style="color:#1D9E75">Fit to Play — '+title+'</h2>');
  w.document.write(document.getElementById('rpt-content').innerHTML);
  w.document.write('<script>window.onload=function(){window.print();}<\/script></body></html>');
  w.document.close();
}

// ══ 유틸 ══
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

// ══ 시작 ══
render();
syncAll();
</script>
